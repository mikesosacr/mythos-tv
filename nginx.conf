# ═══════════════════════════════════════════════════════════════
# MyTV OS — Nginx Configuration
# /etc/nginx/sites-available/mytv-os
#
# Requisitos:
#   - Ubuntu 22.04+
#   - Nginx 1.18+
#   - Opcional: Certbot para HTTPS (muy recomendado para PWA)
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    # ── Cambia esto a tu dominio o IP pública del VPS ──────────
    server_name tu-dominio.com www.tu-dominio.com;
    # Si usas solo IP: server_name _;

    root /var/www/mytv;
    index index.html;

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/mytv-os.access.log;
    error_log  /var/log/nginx/mytv-os.error.log;

    # ── Security Headers ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── PWA Headers ────────────────────────────────────────────
    # Requerido para instalación PWA en Android TV
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── Gzip Compression ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ── SPA Router ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Service Worker — no cache ───────────────────────────────
    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri =404;
    }

    # ── manifest.json — corto cache ────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json";
        try_files $uri =404;
    }

    # ── Assets estáticos — cache largo ─────────────────────────
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── CSS / JS — cache medio con revalidación ─────────────────
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── index.html — sin cache ──────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # ── Bloquear acceso a archivos ocultos ─────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Increase buffer sizes for TV streaming (preparación) ───
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    proxy_buffer_size 4k;
    proxy_buffers 4 32k;
}

